name: Sync test-environment branches with main

# Test-environment branches are each `main` + a committed .claude/settings.json that
# enables a specific plugin set for sessions started on that branch:
#   cloud-plugins -> all four plugins   (firing-test substrate; #67 / #72)
#   no-plugins    -> none enabled       (control: /plugin install one skill in isolation)
# main itself is lean (security-toolkit + makers-toolkit). Each env branch keeps its own
# settings.json via .gitattributes (/.claude/settings.json merge=ours); this job merges
# main into each so they track main's source with no manual merging and no conflict on
# that one file. Runs on every update to main (i.e. every merged PR). Why `push` over
# `pull_request: closed`: it also catches any non-PR way main advances, so an env branch
# can't silently drift.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: sync-test-envs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: [cloud-plugins, no-plugins]
    steps:
      - name: Check out ${{ matrix.branch }} (full history)
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0
      - name: Merge main into ${{ matrix.branch }}
        env:
          TARGET: ${{ matrix.branch }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Enable the 'ours' driver referenced by each env branch's .gitattributes
          # (/.claude/settings.json merge=ours) so the intentional settings.json
          # divergence never blocks the sync.
          git config merge.ours.driver true
          git fetch origin main
          if git merge --no-edit origin/main; then
            git push origin "HEAD:$TARGET"
          else
            echo "::error::Merge conflict syncing main into $TARGET on a file OTHER than .claude/settings.json (handled by merge=ours). Reconcile by hand." >&2
            git merge --abort
            exit 1
          fi
