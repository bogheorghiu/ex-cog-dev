name: MCP smoke test

# Verifies that all five MCP servers can be invoked via uvx and respond
# to a JSON-RPC initialize request. Runs on every push to main and on
# every PR targeting main. If this passes on a main commit, that commit
# is safe to fast-forward into the `release` branch — see CLAUDE.md.
#
# Security note: this workflow does not consume any untrusted input
# (no github.event.*.title/body/etc. used in run: blocks). All inputs
# are hardcoded constants or runner-controlled paths (runner.temp).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      EDGE_GRAPH_PATH: ${{ runner.temp }}/edge-graph-ci
      PORTFOLIO_DATA_DIR: ${{ runner.temp }}/portfolio-ci
      CLAUDE_MEMORY_PATH: ${{ runner.temp }}/claude-memory-ci

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Smoke test all five MCPs
        run: |
          set -uo pipefail
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}}}'

          declare -i failures=0
          declare -a results=()

          probe() {
            local name="$1" path="$2" cmd="$3"
            echo ""
            echo "::group::$name"
            local out
            out=$(echo "$INIT" | timeout 120 uvx --from "$path" "$cmd" 2>&1 | tail -25)
            if echo "$out" | grep -q '"jsonrpc"'; then
              local info
              info=$(echo "$out" | grep -o '"serverInfo":[^}]*}' | head -1)
              echo "PASS — $info"
              results+=("| $name | ✅ PASS |")
              echo "::endgroup::"
              return 0
            else
              echo "FAIL — no JSON-RPC response"
              echo "$out" | sed 's/^/  /'
              results+=("| $name | ❌ FAIL |")
              failures+=1
              echo "::endgroup::"
              return 1
            fi
          }

          probe relational-memory vasana-system/mcp-servers/relational-memory  relational-memory || true
          probe edge-graph        vasana-system/mcp-servers/edge-graph         edge-graph        || true
          probe financial-mcp     research-toolkit/mcp-servers/financial-mcp   financial-mcp     || true
          probe portfolio-mcp     research-toolkit/mcp-servers/portfolio-mcp   portfolio-mcp     || true
          probe transparency-mcp  research-toolkit/mcp-servers/transparency-mcp transparency-mcp || true

          {
            echo "## MCP smoke test"
            echo ""
            echo "| Server | Status |"
            echo "|--------|--------|"
            printf '%s\n' "${results[@]}"
          } >> "$GITHUB_STEP_SUMMARY"

          if (( failures > 0 )); then
            echo ""
            echo "❌ $failures of 5 MCPs failed smoke test"
            exit 1
          fi
          echo ""
          echo "✅ All 5 MCPs passed"
