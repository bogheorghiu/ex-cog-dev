name: MCP smoke test

# Verifies that all five MCP servers can be invoked via uvx and respond
# to a JSON-RPC initialize request. Runs on every push to main and on
# every PR targeting main. If this passes on a main commit, that commit
# is safe to fast-forward into the `release` branch — see CLAUDE.md.
#
# Security note: this workflow does not consume any untrusted input
# (no github.event.*.title/body/etc. used in run: blocks). All inputs
# are hardcoded constants or runner-controlled paths (runner.temp).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Note: env vars that depend on runner context (runner.temp etc.) must be
    # set on the step, not the job — job-level env is evaluated before the
    # runner is provisioned. Static /tmp/* paths are fine on ephemeral runners.
    env:
      EDGE_GRAPH_PATH: /tmp/edge-graph-ci
      PORTFOLIO_DATA_DIR: /tmp/portfolio-ci
      CLAUDE_MEMORY_PATH: /tmp/claude-memory-ci

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7

      - name: Smoke test all five MCPs
        run: |
          set -uo pipefail
          INIT='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0"}}}'

          declare -i failures=0
          declare -a results=()

          probe() {
            local name="$1" path="$2" cmd="$3"
            echo ""
            echo "::group::$name"
            local logfile
            logfile=$(mktemp)
            echo "$INIT" | timeout 120 uvx --from "$path" "$cmd" >"$logfile" 2>&1 || true
            if grep -q '"jsonrpc"' "$logfile"; then
              local info
              info=$(grep -o '"serverInfo":[^}]*}' "$logfile" | head -1)
              echo "PASS — $info"
              results+=("| $name | ✅ PASS |")
              echo "::endgroup::"
              rm -f "$logfile"
              return 0
            fi
            echo "FAIL — no JSON-RPC response"
            tail -50 "$logfile" | sed 's/^/  /'
            results+=("| $name | ❌ FAIL |")
            failures+=1
            echo "::endgroup::"
            rm -f "$logfile"
            return 1
          }

          probe relational-memory vasana-system/mcp-servers/relational-memory   relational-memory
          probe edge-graph        vasana-system/mcp-servers/edge-graph          edge-graph
          probe financial-mcp     research-toolkit/mcp-servers/financial-mcp    financial-mcp
          probe portfolio-mcp     research-toolkit/mcp-servers/portfolio-mcp    portfolio-mcp
          probe transparency-mcp  research-toolkit/mcp-servers/transparency-mcp transparency-mcp

          {
            echo "## MCP smoke test"
            echo ""
            echo "| Server | Status |"
            echo "|--------|--------|"
            printf '%s\n' "${results[@]}"
          } >> "$GITHUB_STEP_SUMMARY"

          if (( failures > 0 )); then
            echo ""
            echo "❌ $failures of 5 MCPs failed smoke test"
            exit 1
          fi
          echo ""
          echo "✅ All 5 MCPs passed"
